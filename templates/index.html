<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viper.in | Online Store</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

<header class="top-bar">
        <div class="nav-left">
            <button id="back-btn" class="back-btn">⬅ Back</button>
            <div class="logo" id="logo-home">viper.in</div>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search here..." id="search-bar">
        </div>
        <div class="cart-icon" id="cart-btn">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main class="container">
        
        <section id="home-page" class="page active">
            
            <div class="hero-banner">
                <h1>Welcome to viper.in</h1>
                <p>Your one-stop shop for everything you need, delivered fast.</p>
            </div>

            <h2 class="section-title">Shop by Category</h2>
            <div class="category-grid">
                
            <div class="category-grid">
                            
               <div class="category-card" data-category="Health Supplements">
        <img src="https://images.unsplash.com/photo-1584017911766-d451b3d0e843?w=500&q=80" alt="Health Supplements">
        <div class="card-title">Health Supplements</div>
    </div>
                
                <div class="category-card" data-category="Skin Care">
                    <img src="https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=500&q=80" alt="Skin Care">
                    <div class="card-title">Skin Care</div>
                </div>
                
                <div class="category-card" data-category="Groceries">
                    <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=500&q=80" alt="Groceries">
                    <div class="card-title">Groceries</div>
                </div>
                
               <div class="category-card" data-category="Home Appliance">
        <img src="https://images.unsplash.com/photo-1574269909862-7e1d70bb8078?w=500&q=80" alt="Home Appliance">
        <div class="card-title">Home Appliance</div>
    </div>
    
    <div class="category-card" data-category="Agri Products">
        <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=500&q=80" alt="Agri Products">
        <div class="card-title">Agri Products</div>
    </div>

            </div>
            </div>
        </section>

        <section id="category-page" class="page">
            <h2 id="category-title" class="section-title">Category Name</h2>
            <div class="horizontal-scroll" id="products-container">
                </div>
        </section>

        <section id="product-page" class="page">
            <div class="product-detail-container" id="product-detail-view">
                </div>
        </section>

        <section id="cart-page" class="page">
            <h2 class="section-title">Your Cart</h2>
            <div class="cart-items-list" id="cart-items-container">
                </div>
            <div class="cart-summary">
                <div class="total-row">
                    <span>Total Amount:</span>
                    <span id="cart-total-amount">₹0</span>
                </div>
                <button class="buy-now-btn" id="checkout-btn">Buy Now</button>
            </div>
        </section>

    </main>

    <script src="../static/js/script.js"></script>
</body>
</html>
