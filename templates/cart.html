{% extends "base.html" %}

{% block title %}Your cart — viper.in{% endblock %}

{% block content %}
<div class="page-container">
    <h1 class="section-heading">Your cart</h1>

    <div id="cart-loading" class="cart-loading">Loading your cart…</div>

    <div id="cart-content" class="cart-layout" hidden>
        <div class="cart-items-list" id="cart-items-list"></div>

        <aside class="cart-summary">
            <h2 class="cart-summary-title">Order summary</h2>
            <div class="cart-summary-row">
                <span>Items</span>
                <span id="cart-summary-count">0</span>
            </div>
            <div class="cart-summary-row cart-summary-total">
                <span>Total</span>
                <span id="cart-summary-total">&#8377;0</span>
            </div>
            <button class="btn btn-primary btn-block" id="checkout-btn">Proceed to buy</button>
            <a href="{{ url_for('home') }}" class="continue-shopping-link">Continue shopping</a>
        </aside>
    </div>

    <div id="cart-empty" class="empty-state" hidden>
        <div class="empty-state-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <h2 class="empty-state-title">Your cart is empty</h2>
        <p class="empty-state-text">Looks like you haven't added anything yet.</p>
        <a href="{{ url_for('home') }}" class="btn btn-primary">Start shopping</a>
    </div>
</div>

<template id="cart-row-template">
    <div class="cart-item-row" data-product-id="">
        <a class="cart-item-image" href="#">
            <img src="" alt="">
        </a>
        <div class="cart-item-details">
            <a class="cart-item-name" href="#"></a>
            <div class="cart-item-unit-price"></div>
        </div>
        <div class="qty-selector cart-item-qty">
            <button class="qty-btn cart-qty-minus" type="button" aria-label="Decrease quantity">&minus;</button>
            <span class="qty-value"></span>
            <button class="qty-btn cart-qty-plus" type="button" aria-label="Increase quantity">+</button>
        </div>
        <div class="cart-item-line-total"></div>
        <button class="cart-item-remove" type="button" aria-label="Remove item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
        </button>
    </div>
</template>
{% endblock %}
