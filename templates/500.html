{% extends "base.html" %}

{% block title %}Something went wrong — viper.in{% endblock %}

{% block content %}
<div class="page-container">

        <h1 class="error-page-title">Something went wrong on our end</h1>

        <a href="{{ url_for('home') }}" class="btn btn-primary">Go to homepage</a>
    </div>
</div>
{% endblock %}
